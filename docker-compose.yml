services:
  postgres:
    image: postgres:16-alpine
    container_name: horizon-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: horizon
      POSTGRES_PASSWORD: horizon123
      POSTGRES_DB: horizon_db
    ports:
      - "5432:5432"
    volumes:
      - horizon_pg_data:/var/lib/postgresql/data

volumes:
  horizon_pg_data:
